<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique — La MontreⓇ</title>
<meta name="description" content="Toute la collection La MontreⓇ : Rolex, Tissot, Longines, Tag Heuer, Gucci, Guess, Emporio Armani, Hugo Boss, Michael Kors, Versace. Livraison gratuite au Maroc.">
<link rel="icon" href="images/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="images/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="images/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="site-header" class="site-header"></header>

<div class="page-hero">
  <div class="wrap" data-reveal="fade">
    <span class="eyebrow on-dark">Boutique</span>
    <h1>Toute la collection</h1>
  </div>
</div>

<section>
  <div class="wrap">
    <div class="toolbar" data-reveal="fade">
      <div class="gender-toggle">
        <button data-gender="all" class="active">Tous</button>
        <button data-gender="Homme">Homme</button>
        <button data-gender="Femme">Femme</button>
      </div>
      <div class="search-box">
        <input type="text" id="filter-search" placeholder="Rechercher une montre...">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="filters">
        <select id="filter-category">
          <option value="all">Toutes les marques</option>
        </select>
        <div class="price-range">
          <input type="number" id="price-min" placeholder="Prix min" min="0">
          <span>–</span>
          <input type="number" id="price-max" placeholder="Prix max" min="0">
        </div>
        <select id="filter-sort">
          <option value="featured">En vedette</option>
          <option value="price-asc">Prix croissant</option>
          <option value="price-desc">Prix décroissant</option>
          <option value="name">Nom (A-Z)</option>
        </select>
      </div>
      <span class="result-count" id="result-count"></span>
    </div>

    <div class="filter-chips" id="filter-chips"></div>

    <div class="grid" id="product-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</section>

<footer id="site-footer" class="site-footer"></footer>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
